<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Auth Page -->
  <section class="auth-page">
    <div class="container">
      <div class="auth-wrapper">
        <div class="auth-visual">
          <img src="images/products/Electronics-Sale.webp" alt="Login">
          <div class="auth-visual-overlay">
            <h2>Welcome Back!</h2>
            <p>Log in to access your orders, wishlist, and exclusive deals.</p>
          </div>
        </div>
        <div class="auth-form-section">
          <div class="auth-form-header">
            <h2>Log In</h2>
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
          </div>
          <form class="auth-form" id="loginForm">
            <div class="form-group">
              <label>Login as</label>
              <div class="role-select">
                <label class="role-option">
                  <input type="radio" name="role" value="customer" checked>
                  <div class="role-card">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Customer</span>
                  </div>
                </label>
                <label class="role-option">
                  <input type="radio" name="role" value="admin">
                  <div class="role-card">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <div class="input-icon">
                <i class="far fa-envelope"></i>
                <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required>
              </div>
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                <button type="button" class="toggle-pass" aria-label="Show password"><i class="far fa-eye"></i></button>
              </div>
            </div>
            <div class="auth-options">
              <label class="checkbox-label">
                <input type="checkbox" id="rememberMe"> <span class="checkmark"></span> Remember me
              </label>
              <a href="404.html" class="forgot-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Log In</button>
          </form>
          <div class="auth-divider"><span>or continue with</span></div>
          <div class="social-auth">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-facebook-f"></i> Facebook</button>
          </div>
          <a href="index.html" class="auth-back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
