<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- 404 Content -->
  <section class="error-page">
    <div class="container">
      <div class="error-content">
        <span class="error-code">404</span>
        <h1>Page Not Found</h1>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-btns">
          <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
          <a href="shop.html" class="btn btn-outline"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
