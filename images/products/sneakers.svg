<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="skb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="sksole" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <filter id="sksh">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#skb)"/>
  <g filter="url(#sksh)" transform="translate(200,210)">
    <!-- Sole -->
    <path d="M-100,30 L100,30 L110,42 C112,46 108,50 104,50 L-90,50 C-96,50 -104,46 -106,42 Z" fill="url(#sksole)"/>
    <!-- Midsole -->
    <path d="M-95,20 L105,20 L100,30 L-100,30 Z" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <!-- Shoe body -->
    <path d="M-90,-20 C-90,-40 -60,-55 -20,-55 L60,-55 C80,-55 100,-45 105,-30 L105,20 L-95,20 Z" fill="#2563eb"/>
    <!-- Toe box -->
    <path d="M-90,-20 C-90,-35 -75,-50 -50,-55 L-20,-55 L-20,20 L-95,20 Z" fill="#1d4ed8"/>
    <!-- Tongue -->
    <path d="M10,-55 C10,-75 25,-80 40,-75 L50,-55 Z" fill="#3b82f6"/>
    <!-- Swoosh/stripe -->
    <path d="M-60,0 C-20,-25 40,-20 90,-5" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Lace holes -->
    <circle cx="0" cy="-40" r="2.5" fill="#1e40af"/>
    <circle cx="15" cy="-42" r="2.5" fill="#1e40af"/>
    <circle cx="30" cy="-40" r="2.5" fill="#1e40af"/>
    <circle cx="45" cy="-38" r="2.5" fill="#1e40af"/>
    <!-- Laces -->
    <path d="M-2,-42 L13,-44 M12,-42 L28,-40 M27,-42 L43,-40" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Collar -->
    <path d="M70,-50 C75,-40 78,-25 80,-10" stroke="#1d4ed8" stroke-width="3" fill="none"/>
    <!-- Heel tab -->
    <rect x="95" y="-45" width="8" height="20" rx="3" fill="#3b82f6"/>
  </g>
</svg>