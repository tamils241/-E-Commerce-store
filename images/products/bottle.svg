<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="btbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="btbody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="30%" stop-color="#9ca3af"/>
      <stop offset="70%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="btsh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#btbg)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="45" ry="8" fill="#b0d4c0" opacity="0.4"/>
  <g filter="url(#btsh)" transform="translate(200,200)">
    <!-- Bottle body -->
    <rect x="-30" y="-50" width="60" height="140" rx="10" fill="url(#btbody)"/>
    <!-- Body highlight -->
    <rect x="-28" y="-48" width="20" height="136" rx="8" fill="white" opacity="0.12"/>
    <!-- Neck -->
    <rect x="-18" y="-70" width="36" height="24" rx="4" fill="#9ca3af"/>
    <rect x="-16" y="-68" width="14" height="20" rx="3" fill="#d1d5db" opacity="0.3"/>
    <!-- Cap -->
    <rect x="-22" y="-95" width="44" height="30" rx="8" fill="#374151"/>
    <rect x="-20" y="-93" width="40" height="26" rx="6" fill="#4b5563"/>
    <!-- Cap top -->
    <rect x="-18" y="-93" width="36" height="6" rx="3" fill="#6b7280"/>
    <!-- Cap grip lines -->
    <line x1="-16" y1="-85" x2="16" y2="-85" stroke="#374151" stroke-width="1"/>
    <line x1="-16" y1="-81" x2="16" y2="-81" stroke="#374151" stroke-width="1"/>
    <line x1="-16" y1="-77" x2="16" y2="-77" stroke="#374151" stroke-width="1"/>
    <!-- Band/stripe -->
    <rect x="-30" y="10" width="60" height="30" fill="#059669"/>
    <rect x="-28" y="12" width="56" height="26" rx="2" fill="#10b981"/>
    <!-- Brand text on band -->
    <text x="0" y="28" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="white" letter-spacing="2">STACKLY</text>
    <!-- Bottom -->
    <rect x="-28" y="86" width="56" height="6" rx="3" fill="#6b7280"/>
    <!-- Water droplets -->
    <ellipse cx="22" cy="-20" rx="2" ry="3" fill="white" opacity="0.3"/>
    <ellipse cx="25" cy="-10" rx="1.5" ry="2" fill="white" opacity="0.25"/>
    <ellipse cx="20" cy="0" rx="2" ry="2.5" fill="white" opacity="0.2"/>
  </g>
</svg>