<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="wbbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <linearGradient id="wbband" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="wbsh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#wbbg)"/>
  <g filter="url(#wbsh)" transform="translate(200,200)">
    <!-- Top strap -->
    <rect x="-20" y="-120" width="40" height="100" rx="8" fill="url(#wbband)"/>
    <rect x="-17" y="-115" width="34" height="90" rx="6" fill="#ef4444"/>
    <!-- Strap holes -->
    <ellipse cx="0" cy="-90" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="-75" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="-60" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="-45" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="-30" rx="4" ry="5" fill="#dc2626"/>
    <!-- Bottom strap -->
    <rect x="-20" y="20" width="40" height="100" rx="8" fill="url(#wbband)"/>
    <rect x="-17" y="25" width="34" height="90" rx="6" fill="#ef4444"/>
    <!-- Strap holes bottom -->
    <ellipse cx="0" cy="45" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="60" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="75" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="90" rx="4" ry="5" fill="#dc2626"/>
    <ellipse cx="0" cy="105" rx="4" ry="5" fill="#dc2626"/>
    <!-- Strap texture lines -->
    <line x1="-14" y1="-110" x2="-14" y2="-25" stroke="#dc2626" stroke-width="0.5" opacity="0.5"/>
    <line x1="14" y1="-110" x2="14" y2="-25" stroke="#dc2626" stroke-width="0.5" opacity="0.5"/>
    <line x1="-14" y1="25" x2="-14" y2="110" stroke="#dc2626" stroke-width="0.5" opacity="0.5"/>
    <line x1="14" y1="25" x2="14" y2="110" stroke="#dc2626" stroke-width="0.5" opacity="0.5"/>
    <!-- Connector pins (top) -->
    <rect x="-15" y="-20" width="30" height="6" rx="2" fill="#9ca3af"/>
    <circle cx="-10" cy="-17" r="1.5" fill="#6b7280"/>
    <circle cx="10" cy="-17" r="1.5" fill="#6b7280"/>
    <!-- Connector pins (bottom) -->
    <rect x="-15" y="14" width="30" height="6" rx="2" fill="#9ca3af"/>
    <circle cx="-10" cy="17" r="1.5" fill="#6b7280"/>
    <circle cx="10" cy="17" r="1.5" fill="#6b7280"/>
    <!-- Buckle -->
    <rect x="-12" y="-120" width="24" height="14" rx="3" fill="#9ca3af"/>
    <rect x="-10" y="-118" width="20" height="10" rx="2" fill="#b0b0b0"/>
    <line x1="0" y1="-118" x2="0" y2="-108" stroke="#808080" stroke-width="2"/>
  </g>
</svg>