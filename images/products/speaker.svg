<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="spbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="spbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="spsh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#spbg)"/>
  <g filter="url(#spsh)" transform="translate(200,200) rotate(-15)">
    <!-- Speaker cylinder body -->
    <ellipse cx="0" cy="-70" rx="40" ry="12" fill="#5558e6"/>
    <rect x="-40" y="-70" width="80" height="140" fill="url(#spbody)"/>
    <ellipse cx="0" cy="70" rx="40" ry="12" fill="#4338ca"/>
    <!-- Speaker grille (top) -->
    <ellipse cx="0" cy="-68" rx="36" ry="10" fill="#4f46e5"/>
    <!-- Speaker grille lines -->
    <line x1="-30" y1="-50" x2="-30" y2="50" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="-55" x2="-20" y2="55" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="-10" y1="-58" x2="-10" y2="58" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="-58" x2="10" y2="58" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-55" x2="20" y2="55" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-50" x2="30" y2="50" stroke="#5558e6" stroke-width="1" opacity="0.5"/>
    <!-- Horizontal grille lines -->
    <line x1="-38" y1="-30" x2="38" y2="-30" stroke="#5558e6" stroke-width="1" opacity="0.3"/>
    <line x1="-39" y1="-10" x2="39" y2="-10" stroke="#5558e6" stroke-width="1" opacity="0.3"/>
    <line x1="-39" y1="10" x2="39" y2="10" stroke="#5558e6" stroke-width="1" opacity="0.3"/>
    <line x1="-38" y1="30" x2="38" y2="30" stroke="#5558e6" stroke-width="1" opacity="0.3"/>
    <!-- Power button -->
    <circle cx="0" cy="-58" r="4" fill="#3730a3"/>
    <circle cx="0" cy="-58" r="2.5" fill="#818cf8"/>
    <!-- Rubber base -->
    <ellipse cx="0" cy="68" rx="38" ry="10" fill="#3730a3"/>
    <!-- Brand logo -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#818cf8"/>
  </g>
</svg>