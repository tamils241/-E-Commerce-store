<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <linearGradient id="bbbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <filter id="bbsh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bbg)"/>
  <g filter="url(#bbsh)" transform="translate(200,210)">
    <!-- Main body -->
    <rect x="-70" y="-80" width="140" height="140" rx="18" fill="url(#bbbody)"/>
    <!-- Top flap -->
    <path d="M-60,-80 C-60,-100 60,-100 60,-80" fill="#374151"/>
    <path d="M-55,-80 C-55,-95 55,-95 55,-80" fill="#4b5563"/>
    <!-- Front pocket -->
    <rect x="-50" y="-10" width="100" height="50" rx="10" fill="#374151" stroke="#4b5563" stroke-width="1"/>
    <!-- Pocket zipper -->
    <line x1="-42" y1="-5" x2="42" y2="-5" stroke="#9ca3af" stroke-width="1.5"/>
    <circle cx="42" cy="-5" r="3" fill="#9ca3af"/>
    <!-- Front buckle -->
    <rect x="-8" y="-75" width="16" height="10" rx="3" fill="#6b7280"/>
    <rect x="-5" y="-72" width="10" height="4" rx="1" fill="#9ca3af"/>
    <!-- Side pockets -->
    <rect x="-78" y="-20" width="16" height="40" rx="6" fill="#374151"/>
    <rect x="62" y="-20" width="16" height="40" rx="6" fill="#374151"/>
    <!-- Straps -->
    <path d="M-45,-80 C-50,-110 -40,-130 -30,-110 L-25,-80" fill="#4b5563"/>
    <path d="M45,-80 C50,-110 40,-130 30,-110 L25,-80" fill="#4b5563"/>
    <!-- Handle -->
    <path d="M-15,-100 C-15,-118 15,-118 15,-100" stroke="#6b7280" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Logo area -->
    <circle cx="0" cy="20" r="10" fill="#4b5563" stroke="#6b7280" stroke-width="1"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#9ca3af">S</text>
  </g>
</svg>