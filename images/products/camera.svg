<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fefce8"/>
    </linearGradient>
    <linearGradient id="clens" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="csh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#cbg)"/>
  <g filter="url(#csh)" transform="translate(190,200)">
    <!-- Camera body -->
    <rect x="-70" y="-35" width="140" height="80" rx="8" fill="#1f2937"/>
    <rect x="-68" y="-33" width="136" height="76" rx="6" fill="#374151"/>
    <!-- Top section -->
    <rect x="-65" y="-45" width="130" height="15" rx="4" fill="#1f2937"/>
    <!-- Viewfinder -->
    <rect x="30" y="-55" width="25" height="18" rx="3" fill="#111827"/>
    <rect x="33" y="-52" width="19" height="12" rx="2" fill="#374151"/>
    <!-- Flash hotshoe -->
    <rect x="-30" y="-50" width="40" height="5" rx="1" fill="#4b5563"/>
    <!-- Mode dial -->
    <circle cx="50" cy="-42" r="8" fill="#4b5563"/>
    <circle cx="50" cy="-42" r="6" fill="#6b7280"/>
    <line x1="50" y1="-48" x2="50" y2="-44" stroke="#d1d5db" stroke-width="1"/>
    <!-- Shutter button -->
    <circle cx="30" cy="-52" r="5" fill="#9ca3af"/>
    <circle cx="30" cy="-52" r="3.5" fill="#d1d5db"/>
    <!-- Lens mount -->
    <circle cx="-10" cy="5" r="38" fill="#111827"/>
    <circle cx="-10" cy="5" r="35" fill="#1f2937"/>
    <!-- Lens barrel -->
    <circle cx="-10" cy="5" r="32" fill="#2a2a2a"/>
    <circle cx="-10" cy="5" r="28" fill="#1a1a1a"/>
    <!-- Lens glass -->
    <circle cx="-10" cy="5" r="20" fill="#0f172a"/>
    <circle cx="-10" cy="5" r="18" fill="#1e293b"/>
    <!-- Lens reflection -->
    <ellipse cx="-15" cy="0" rx="8" ry="10" fill="#3b82f6" opacity="0.15"/>
    <ellipse cx="-14" cy="-2" rx="4" ry="5" fill="#60a5fa" opacity="0.1"/>
    <!-- Focus ring -->
    <circle cx="-10" cy="5" r="25" fill="none" stroke="#4b5563" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- Grip -->
    <rect x="55" y="-30" width="15" height="65" rx="4" fill="#2a2a2a"/>
    <rect x="57" y="-28" width="11" height="60" rx="3" fill="#333"/>
    <!-- Red recording dot -->
    <circle cx="-50" cy="-38" r="3" fill="#ef4444"/>
  </g>
</svg>