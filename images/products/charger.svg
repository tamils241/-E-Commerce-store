<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="chbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="chpad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="chsh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#chbg)"/>
  <!-- Shadow on surface -->
  <ellipse cx="200" cy="250" rx="90" ry="15" fill="#d4d0e8" opacity="0.5"/>
  <g filter="url(#chsh)" transform="translate(200,230)">
    <!-- Charger base (side view) -->
    <ellipse cx="0" cy="10" rx="80" ry="20" fill="#2a2a2a"/>
    <rect x="-80" y="-8" width="160" height="18" fill="url(#chpad)"/>
    <ellipse cx="0" cy="-8" rx="80" ry="20" fill="#2a2a2a"/>
    <ellipse cx="0" cy="-8" rx="78" ry="18" fill="#1f1f1f"/>
    <!-- Top surface -->
    <ellipse cx="0" cy="-8" rx="70" ry="16" fill="#222"/>
    <!-- LED ring -->
    <ellipse cx="0" cy="-8" rx="50" ry="11" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <ellipse cx="0" cy="-8" rx="50" ry="11" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
    <!-- Inner pad -->
    <ellipse cx="0" cy="-8" rx="42" ry="9" fill="#2a2a2a"/>
    <!-- Charging symbol -->
    <path d="M-4,-12 L1,-8 L-1,-8 L4,-4 L-1,-4 L1,-8" fill="#3b82f6" opacity="0.7"/>
    <!-- Anti-slip surface dots -->
    <circle cx="-30" cy="-8" r="0.8" fill="#333"/>
    <circle cx="-20" cy="-10" r="0.8" fill="#333"/>
    <circle cx="-10" cy="-6" r="0.8" fill="#333"/>
    <circle cx="10" cy="-10" r="0.8" fill="#333"/>
    <circle cx="20" cy="-6" r="0.8" fill="#333"/>
    <circle cx="30" cy="-8" r="0.8" fill="#333"/>
    <circle cx="0" cy="-12" r="0.8" fill="#333"/>
    <circle cx="0" cy="-4" r="0.8" fill="#333"/>
    <!-- Cable -->
    <path d="M70,-8 C85,-8 90,5 85,15 L75,25" stroke="#444" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M70,-8 C85,-8 90,5 85,15 L75,25" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- USB-C connector -->
    <rect x="70" y="23" width="10" height="6" rx="2" fill="#888"/>
    <rect x="71" y="24" width="8" height="4" rx="1" fill="#aaa"/>
  </g>
</svg>