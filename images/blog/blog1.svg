<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="b1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="12" fill="url(#b1bg)"/>
  <!-- Decorative circles -->
  <circle cx="480" cy="80" r="80" fill="white" opacity="0.05"/>
  <circle cx="520" cy="320" r="60" fill="white" opacity="0.04"/>
  <!-- Tech items flat lay -->
  <!-- Laptop -->
  <rect x="100" y="140" width="120" height="80" rx="4" fill="#374151"/>
  <rect x="104" y="144" width="112" height="68" rx="2" fill="#1e293b"/>
  <rect x="108" y="148" width="104" height="60" rx="1" fill="#0f172a"/>
  <!-- Screen glow -->
  <rect x="112" y="152" width="96" height="52" rx="1" fill="#1e40af" opacity="0.3"/>
  <!-- Phone -->
  <rect x="250" y="160" width="45" height="80" rx="6" fill="#1a1a1a"/>
  <rect x="253" y="165" width="39" height="68" rx="4" fill="#0f172a"/>
  <rect x="255" y="168" width="35" height="60" rx="3" fill="#ec4899" opacity="0.2"/>
  <!-- Headphones -->
  <circle cx="380" cy="200" r="28" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <rect x="352" y="195" width="16" height="25" rx="6" fill="#1a1a1a"/>
  <rect x="392" y="195" width="16" height="25" rx="6" fill="#1a1a1a"/>
  <!-- Watch -->
  <rect x="420" y="280" width="30" height="40" rx="8" fill="#1a1a1a"/>
  <rect x="423" y="285" width="24" height="30" rx="6" fill="#2a2a2a"/>
  <rect x="425" y="288" width="20" height="24" rx="4" fill="#10b981" opacity="0.4"/>
  <!-- Earbuds case -->
  <rect x="180" y="290" width="50" height="30" rx="12" fill="white" opacity="0.15"/>
  <!-- Charger pad -->
  <circle cx="320" cy="310" r="22" fill="white" opacity="0.1"/>
  <circle cx="320" cy="310" r="16" fill="white" opacity="0.08"/>
  <!-- Tag -->
  <rect x="30" y="30" width="60" height="28" rx="14" fill="#818cf8"/>
  <text x="60" y="49" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white">TECH</text>
  <!-- Title area -->
  <text x="30" y="360" font-family="system-ui" font-size="18" font-weight="700" fill="white">Top 10 Tech Gadgets</text>
  <text x="30" y="382" font-family="system-ui" font-size="12" fill="#c7d2fe">A flat lay of must-have gadgets for 2026</text>
</svg>