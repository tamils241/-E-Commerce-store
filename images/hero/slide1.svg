<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="h1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="h1text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="h1sh">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#h1bg)"/>
  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="180" fill="white" opacity="0.05"/>
  <circle cx="1050" cy="200" r="120" fill="white" opacity="0.06"/>
  <circle cx="800" cy="400" r="100" fill="white" opacity="0.04"/>
  <circle cx="100" cy="450" r="80" fill="white" opacity="0.05"/>
  <circle cx="200" cy="50" r="60" fill="white" opacity="0.04"/>
  <!-- Small dots pattern -->
  <circle cx="750" cy="150" r="3" fill="white" opacity="0.15"/>
  <circle cx="780" cy="120" r="2" fill="white" opacity="0.15"/>
  <circle cx="810" cy="160" r="3" fill="white" opacity="0.12"/>
  <circle cx="840" cy="130" r="2" fill="white" opacity="0.12"/>
  <circle cx="760" cy="180" r="2" fill="white" opacity="0.1"/>
  <!-- Text content -->
  <text x="100" y="180" font-family="system-ui" font-size="18" font-weight="600" fill="#c7d2fe" letter-spacing="6">LIMITED OFFER</text>
  <text x="100" y="250" font-family="system-ui" font-size="72" font-weight="900" fill="white" letter-spacing="4">ELECTRONICS</text>
  <text x="100" y="300" font-family="system-ui" font-size="22" fill="#c7d2fe">Up to 50% off on premium audio gear</text>
  <!-- CTA Button -->
  <rect x="100" y="330" width="200" height="55" rx="28" fill="white"/>
  <text x="200" y="364" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="#4F46E5">SHOP NOW</text>
  <!-- Headphones illustration -->
  <g filter="url(#h1sh)" transform="translate(750,250)">
    <path d="M-80,-70 C-80,-130 80,-130 80,-70" stroke="#1a1a1a" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M-77,-68 C-77,-125 77,-125 77,-68" stroke="#333" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="-100" y="-65" width="44" height="70" rx="18" fill="#1a1a1a"/>
    <rect x="-96" y="-60" width="36" height="58" rx="14" fill="#2a2a2a"/>
    <ellipse cx="-78" cy="-30" rx="10" ry="20" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.9"/>
    <ellipse cx="-78" cy="-30" rx="5" ry="10" fill="#60a5fa" opacity="0.5"/>
    <rect x="56" y="-65" width="44" height="70" rx="18" fill="#1a1a1a"/>
    <rect x="60" y="-60" width="36" height="58" rx="14" fill="#2a2a2a"/>
    <ellipse cx="78" cy="-30" rx="10" ry="20" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.9"/>
    <ellipse cx="78" cy="-30" rx="5" ry="10" fill="#60a5fa" opacity="0.5"/>
    <rect x="-95" y="-50" width="34" height="40" rx="12" fill="#333"/>
    <rect x="61" y="-50" width="34" height="40" rx="12" fill="#333"/>
