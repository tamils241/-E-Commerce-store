<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="h3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="h3sh">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#h3bg)"/>
  <!-- Decorative circles -->
  <circle cx="920" cy="80" r="160" fill="white" opacity="0.05"/>
  <circle cx="1080" cy="250" r="110" fill="white" opacity="0.06"/>
  <circle cx="780" cy="430" r="90" fill="white" opacity="0.04"/>
  <circle cx="120" cy="420" r="60" fill="white" opacity="0.05"/>
  <!-- Accent shapes -->
  <rect x="830" y="60" width="25" height="25" rx="4" fill="white" opacity="0.06" transform="rotate(20,842,72)"/>
  <rect x="1000" y="380" width="20" height="20" rx="3" fill="white" opacity="0.05" transform="rotate(-15,1010,390)"/>
  <!-- Text -->
  <text x="100" y="180" font-family="system-ui" font-size="18" font-weight="600" fill="#d1fae5" letter-spacing="6">TRENDING NOW</text>
  <text x="100" y="250" font-family="system-ui" font-size="72" font-weight="900" fill="white" letter-spacing="4">HOME</text>
  <text x="100" y="300" font-family="system-ui" font-size="22" fill="#d1fae5">Transform your space with modern furniture</text>
  <rect x="100" y="330" width="200" height="55" rx="28" fill="white"/>
  <text x="200" y="364" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="#10B981">DISCOVER</text>
  <!-- Sofa illustration -->
  <g filter="url(#h3sh)" transform="translate(780,280)">
    <!-- Sofa body -->
    <rect x="-100" y="-30" width="200" height="70" rx="16" fill="white"/>
    <rect x="-96" y="-26" width="192" height="62" rx="12" fill="#f0fdf4"/>
    <!-- Sofa back -->
    <rect x="-90" y="-65" width="180" height="40" rx="12" fill="white"/>
    <rect x="-86" y="-61" width="172" height="32" rx="8" fill="#ecfdf5"/>
    <!-- Cushions -->
    <rect x="-85" y="-22" width="55" height="50" rx="8" fill="white"/>
    <rect x="-82" y="-19" width="49" height="44" rx="6" fill="#d1fae5"/>
    <rect x="30" y="-22" width="55" height="50" rx="8" fill="white"/>
    <rect x="33" y="-19" width="49" height="44" rx="6" fill="#d1fae5"/>
    <!-- Armrests -->
    <rect x="-108" y="-40" width="16" height="80" rx="8" fill="white"/>
    <rect x="92" y="-40" width="16" height="80" rx="8" fill="white"/>
    <!-- Legs -->
    <rect x="-85" y="40" width="8" height="16" rx="2" fill="#9ca3af"/>
    <rect x="77" y="40" width="8" height="16" rx="2" fill="#9ca3af"/>
    <!-- Decorative pillow -->
    <rect x="-70" y="-55" width="25" height="25" rx="6" fill="#10B981"/>
    <!-- Side table -->
    <circle cx="140" cy="-10" r="25" fill="white"/>
    <circle cx="140" cy="-10" r="22" fill="#ecfdf5"/>
    <rect x="137" y="15" width="6" height="25" fill="#9ca3af"/>
    <!-- Plant on table -->
    <circle cx="140" cy="-20" r="10" fill="#10B981" opacity="0.6"/>
    <circle cx="135" cy="-25" r="7" fill="#059669" opacity="0.5"/>
    <circle cx="145" cy="-25" r="7" fill="#34d399" opacity="0.5"/>
    <rect x="138" y="-12" width="4" height="8" fill="#6b7280"/>
  </g>
</svg>